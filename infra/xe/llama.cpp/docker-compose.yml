services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.openvino
      target: server
    image: llama-openvino:latest
    container_name: llama
    ports:
      - "8080:8080"
    environment:
      - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL}
      - LLAMA_ARGS=${LLAMA_ARGS:---jinja -t 8}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - GGML_OPENVINO_DEVICE=GPU
    volumes:
      - ${HF_HOME:-$HOME/.cache/huggingface}:/root/.cache/huggingface
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - video
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

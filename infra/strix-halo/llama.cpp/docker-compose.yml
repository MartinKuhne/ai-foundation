services:
  llama-coding:
    image: llama-amdvlk
    ports:
      - "8080:8080"
    environment:
      - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 --flash-attn on --jinja --cache-type-k q8_0 --cache-type-v q8_0 --no-mmproj --threads 8 --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0 --presence-penalty 0.0 --repeat-penalty 1.0 --no-mmap}
#     - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 --flash-attn on --jinja --cache-type-k q8_0 --cache-type-v q8_0 --no-mmproj --threads 4 --no-mmap}
#     - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 --flash-attn on --jinja --no-mmproj --threads 4 --no-mmap}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.5-122B-A10B-GGUF:UD-Q6_K_XL}
      - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q8_K_XL}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.6-27B-GGUF:UD-Q8_K_XL}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3-Coder-Next-GGUF:Q8_0}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/gemma-4-26B-A4b-it-GGUF:Q8_0}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/gemma-4-31B-it-GGUF:UD-Q8_K_XL}

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped

  llama-deep-coding:
    image: llama-amdvlk
    ports:
      - "8081:8080"
    environment:
      - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 --flash-attn on --jinja --cache-type-k q8_0 --cache-type-v q8_0 --no-mmproj --threads 8 --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0  --presence-penalty 0.0  --repeat-penalty 1.0 --no-mmap}
#     - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 --flash-attn on --jinja --cache-type-k q8_0 --cache-type-v q8_0 --no-mmproj --threads 4 --no-mmap}
#     - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 --flash-attn on --jinja --no-mmproj --threads 4 --no-mmap}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.5-122B-A10B-GGUF:UD-Q6_K_XL}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q8_K_XL}
      - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3.6-27B-GGUF:UD-Q8_K_XL}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen3-Coder-Next-GGUF:Q8_0}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/gemma-4-26B-A4b-it-GGUF:Q8_0}
#     - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/gemma-4-31B-it-GGUF:UD-Q8_K_XL}

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped

  llama-embeddings:
    image: llama-amdvlk
    ports:
      - "8082:8080"
    environment:
      - LLAMA_ARGS=${LLAMA_ARGS:---embeddings --flash-attn on --pooling last --ctx-size 8192 --parallel 2 --no-mmap}
      - LLAMA_MODEL=${LLAMA_MODEL:-Qwen/Qwen3-Embedding-8B-GGUF:Q8_0}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped
    profiles:
      - my-life

  llama-vision:
    image: llama-amdvlk
    ports:
      - "8083:8080"
    environment:
      - LLAMA_ARGS=${LLAMA_ARGS:--ngl 99 -t 8 --flash-attn on --jinja --ctx-size 32768 --parallel 2 --no-mmap}
      - LLAMA_MODEL=${LLAMA_MODEL:-unsloth/Qwen2.5-VL-7B-Instruct-GGUF:Q8_0}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    restart: unless-stopped
    profiles:
      - my-life

